<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Duozz Flow - Modern Project Management">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Duozz Flow">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <title>Duozz Flow</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #F1F5F9;
    }
    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      font-family: 'Poppins', sans-serif;
    }
    .loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e2e8f0;
      border-top: 3px solid #2563EB;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading p {
      margin-top: 16px;
      color: #64748B;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Loading Duozz Flow...</p>
  </div>
  <script>
    // Clear old Flutter service workers and caches (but keep push-sw.js)
    (async function() {
      if ('serviceWorker' in navigator) {
        var regs = await navigator.serviceWorker.getRegistrations();
        for (var r of regs) {
          if (r.active && r.active.scriptURL && r.active.scriptURL.indexOf('push-sw.js') !== -1) continue;
          await r.unregister();
        }
      }
      if ('caches' in window) {
        var names = await caches.keys();
        for (var n of names) { await caches.delete(n); }
      }
    })();

    // Push notification setup
    window._pushSwRegistration = null;
    window._pushToken = null;
    window._pushSubscribed = false;

    window.initPushNotifications = function(authToken) {
      window._pushToken = authToken;
      // Try immediately (works if permission already granted or browser allows)
      _trySubscribePush();
      // Also try on next user interaction (required by some browsers)
      document.addEventListener('click', _trySubscribePush, { once: false });
      document.addEventListener('touchstart', _trySubscribePush, { once: false });
    };

    async function _trySubscribePush() {
      if (window._pushSubscribed || !window._pushToken) return;
      if (!('serviceWorker' in navigator) || !('PushManager' in window) || !('Notification' in window)) return;

      try {
        // Check current permission state
        var currentPerm = Notification.permission;
        if (currentPerm === 'denied') return;

        // Request permission (will show prompt if 'default', auto-grant if 'granted')
        var permission = await Notification.requestPermission();
        if (permission !== 'granted') return;

        // Register service worker
        var reg = await navigator.serviceWorker.register('/push-sw.js');
        await navigator.serviceWorker.ready;
        window._pushSwRegistration = reg;

        // Check if already subscribed
        var existingSub = await reg.pushManager.getSubscription();
        if (existingSub) {
          // Already subscribed, just send to server
          await fetch('/api/v1/push/subscribe', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + window._pushToken },
            body: JSON.stringify({ subscription: existingSub.toJSON() })
          });
          window._pushSubscribed = true;
          console.log('Push: already subscribed, registered with server');
          return;
        }

        // Get VAPID key and subscribe
        var resp = await fetch('/api/v1/push/vapid-key', {
          headers: { 'Authorization': 'Bearer ' + window._pushToken }
        });
        var data = await resp.json();
        var vapidKey = data.publicKey;
        var rawKey = atob(vapidKey.replace(/-/g, '+').replace(/_/g, '/'));
        var keyArray = new Uint8Array(rawKey.length);
        for (var i = 0; i < rawKey.length; i++) { keyArray[i] = rawKey.charCodeAt(i); }

        var subscription = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: keyArray
        });

        await fetch('/api/v1/push/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + window._pushToken },
          body: JSON.stringify({ subscription: subscription.toJSON() })
        });

        window._pushSubscribed = true;
        console.log('Push notifications enabled');
      } catch (e) {
        console.error('Push setup:', e.message || e);
      }
    }

    // Notification sound system
    window._notifAudioCtx = null;
    window._notifUnlocked = false;

    // Unlock audio on first user interaction (required by browsers)
    function _unlockAudio() {
      if (window._notifUnlocked) return;
      try {
        if (!window._notifAudioCtx) {
          window._notifAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (window._notifAudioCtx.state === 'suspended') {
          window._notifAudioCtx.resume();
        }
        // Create a silent buffer to fully unlock
        var buf = window._notifAudioCtx.createBuffer(1, 1, 22050);
        var src = window._notifAudioCtx.createBufferSource();
        src.buffer = buf;
        src.connect(window._notifAudioCtx.destination);
        src.start(0);
        window._notifUnlocked = true;
      } catch(e) {}
    }
    document.addEventListener('click', _unlockAudio, {once: false});
    document.addEventListener('touchstart', _unlockAudio, {once: false});
    document.addEventListener('keydown', _unlockAudio, {once: false});

    // Play notification sound - called from Flutter via JS interop
    window.playDuozzNotificationSound = function() {
      try {
        if (!window._notifAudioCtx) {
          window._notifAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        var ctx = window._notifAudioCtx;
        if (ctx.state === 'suspended') { ctx.resume(); }
        var now = ctx.currentTime;

        // Tone 1: 800Hz
        var o1 = ctx.createOscillator();
        var g1 = ctx.createGain();
        o1.connect(g1); g1.connect(ctx.destination);
        o1.frequency.value = 800; o1.type = 'sine';
        g1.gain.setValueAtTime(0.5, now);
        g1.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
        o1.start(now); o1.stop(now + 0.15);

        // Tone 2: 1000Hz
        var o2 = ctx.createOscillator();
        var g2 = ctx.createGain();
        o2.connect(g2); g2.connect(ctx.destination);
        o2.frequency.value = 1000; o2.type = 'sine';
        g2.gain.setValueAtTime(0.5, now + 0.2);
        g2.gain.exponentialRampToValueAtTime(0.01, now + 0.35);
        o2.start(now + 0.2); o2.stop(now + 0.35);

        // Tone 3: 1200Hz
        var o3 = ctx.createOscillator();
        var g3 = ctx.createGain();
        o3.connect(g3); g3.connect(ctx.destination);
        o3.frequency.value = 1200; o3.type = 'sine';
        g3.gain.setValueAtTime(0.4, now + 0.4);
        g3.gain.exponentialRampToValueAtTime(0.01, now + 0.55);
        o3.start(now + 0.4); o3.stop(now + 0.55);
      } catch(e) {
        console.warn('Notification sound failed:', e);
      }
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
